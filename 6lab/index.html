<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна робота - Об'єкти JS</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-start: #3b82f6;
            --accent-end: #8b5cf6;
            --text-primary: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 20% 30%, rgba(59, 130, 246, 0.15) 0px, transparent 40%),
                radial-gradient(at 80% 80%, rgba(139, 92, 246, 0.15) 0px, transparent 40%);
            color: var(--text-primary);
        }

        .menu {
            background: var(--card-bg);
            padding: 50px 40px;
            border-radius: 20px;
            border: 1px solid var(--card-border);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 40px;
            font-size: 2.2rem;
            background: linear-gradient(to right, var(--accent-start), var(--accent-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        a {
            text-decoration: none;
            color: white;
            background: linear-gradient(45deg, var(--accent-start), var(--accent-end));
            padding: 16px 30px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            width: 80%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        a:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.5);
            opacity: 0.95;
        }
    </style>
</head>

<body>
    <div class="menu">
        <h1>JavaScript: Об'єкти</h1>
        <div class="links">
            <a href="task1.html">Завдання 1 (Дні тижня)</a>
            <a href="task2.html">Завдання 2 (Електромережа)</a>
        </div>
    </div>
</body>

</html>
