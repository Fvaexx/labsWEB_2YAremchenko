<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завдання 2 - Електромережа</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-start: #f59e0b; /* Оранжевий (енергія) */
            --accent-end: #ef4444;   /* Червоний */
            --text-primary: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            padding: 40px 20px;
            margin: 0;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(245, 158, 11, 0.1) 0px, transparent 40%),
                radial-gradient(at 100% 100%, rgba(239, 68, 68, 0.1) 0px, transparent 40%);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--card-border);
            max-width: 600px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        h2 {
            margin-top: 0;
            color: #fff;
            border-bottom: 2px solid var(--accent-start);
            display: inline-block;
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 25px;
        }

        .result-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--accent-start);
            margin-top: 25px;
            font-family: 'Consolas', monospace;
            font-size: 0.95rem;
            color: #fff;
            white-space: pre-wrap;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--accent-start), var(--accent-end));
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 158, 11, 0.5);
        }

        .back-link {
            display: block;
            margin-top: 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            text-align: center;
            transition: color 0.3s;
        }
        .back-link:hover {
            color: var(--text-primary);
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Енергобаланс міста</h2>
        <p>Натисніть кнопку, щоб розрахувати баланс енергії та фінансові показники для об'єктів електромережі (робота з масивом об'єктів).</p>
        
        <button onclick="calculateEnergy()">Розрахувати баланс</button>
        <div id="output" class="result-box" style="display:none;"></div>

        <a href="index.html" class="back-link">← Повернутися до меню</a>
    </div>
    
    <script src="task2.js"></script>
</body>

</html>
