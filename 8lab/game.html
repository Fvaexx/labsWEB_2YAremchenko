<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrono Game - Play</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --accent-start: #3b82f6;
            --accent-end: #8b5cf6;
            --correct-color: #10b981; /* Неоновий зелений для вибраних клітинок */
            --text-primary: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Segoe UI', Roboto, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
            background-image: 
                radial-gradient(at 10% 10%, rgba(59, 130, 246, 0.15) 0px, transparent 40%),
                radial-gradient(at 90% 90%, rgba(139, 92, 246, 0.15) 0px, transparent 40%);
        }

        .header-info {
            width: 440px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            font-size: 1.2rem;
            font-weight: 600;
            background: var(--card-bg);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            box-sizing: border-box;
        }

        #timer {
            color: #f43f5e;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(244, 63, 94, 0.5);
        }

        #status-msg {
            color: var(--accent-start);
        }

        #game-grid {
            display: grid;
            grid-template-columns: repeat(5, 80px);
            grid-template-rows: repeat(4, 80px);
            gap: 12px;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--card-border);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
        }

        .cell {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-primary);
            transition: all 0.2s ease;
            box-shadow: inset 0 0 0 rgba(255, 255, 255, 0);
        }

        .cell:hover {
            background-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .cell:active {
            transform: scale(0.92);
        }

        .cell.selected {
            background: linear-gradient(135deg, #10b981, #059669) !important;
            border-color: #10b981 !important;
            color: white !important;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.6) !important;
            transform: scale(0.98);
        }

        .controls {
            margin-top: 30px;
        }

        .btn {
            background: linear-gradient(45deg, var(--accent-start), var(--accent-end));
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.6);
        }

        .btn:active {
            transform: translateY(1px);
        }

        #stats-table {
            margin-top: 35px;
            border-collapse: separate;
            border-spacing: 0;
            width: 440px;
            text-align: center;
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        #stats-table th {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        #stats-table td {
            padding: 12px 15px;
            border-top: 1px solid var(--card-border);
        }

        .best-result {
            background-color: rgba(16, 185, 129, 0.15) !important;
            color: #34d399;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(52, 211, 153, 0.4);
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        
        .back-link:hover {
            color: var(--text-primary);
        }
    </style>
</head>

<body>

    <div class="header-info">
        <div>Time: <span id="timer">60</span>с</div>
        <div id="status-msg">Find: 1</div>
    </div>

    <div id="game-grid"></div>

    <div class="controls">
        <button class="btn" onclick="initGame()">Start game from the beginning</button>
    </div>

    <table id="stats-table">
        <thead>
            <tr>
                <th>Attempt</th>
                <th>Result (seconds)</th>
            </tr>
        </thead>
        <tbody id="stats-body"></tbody>
    </table>

    <a href="index.html" class="back-link">← Back to Menu</a>

    <!-- Бібліотека jQuery та ваш оригінальний скрипт -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="game.js"></script>
</body>

</html>
