<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrono Game - Start</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-start: #3b82f6;
            --accent-end: #8b5cf6;
            --text-primary: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: 
                radial-gradient(at 20% 30%, rgba(59, 130, 246, 0.15) 0px, transparent 40%),
                radial-gradient(at 80% 80%, rgba(139, 92, 246, 0.15) 0px, transparent 40%);
        }

        .container {
            text-align: center;
            padding: 60px 50px;
            border-radius: 20px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            max-width: 400px;
            width: 100%;
        }

        h1 {
            font-weight: 800;
            letter-spacing: 3px;
            margin-top: 0;
            margin-bottom: 40px;
            font-size: 2.5rem;
            text-transform: uppercase;
            background: linear-gradient(to right, var(--accent-start), var(--accent-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .start-btn {
            background: linear-gradient(45deg, var(--accent-start), var(--accent-end));
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.6);
        }
        
        .start-btn:active {
            transform: translateY(1px);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Chrono Game</h1>
        <a href="game.html" class="start-btn">Start Game</a>
    </div>
</body>

</html>
