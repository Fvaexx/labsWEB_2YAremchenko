<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завдання 2. Вгадай число</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-start: #f59e0b; /* Оранжевий (гра) */
            --accent-end: #ef4444;   /* Червоний */
            --text-primary: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(245, 158, 11, 0.1) 0px, transparent 40%),
                radial-gradient(at 100% 100%, rgba(239, 68, 68, 0.1) 0px, transparent 40%);
            color: var(--text-primary);
        }

        .game-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--card-border);
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            box-sizing: border-box;
        }

        h1 {
            margin-top: 0;
            font-size: 2.2rem;
            background: linear-gradient(to right, var(--accent-start), var(--accent-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 1.1rem;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 8px;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, var(--accent-start), var(--accent-end));
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(245, 158, 11, 0.5);
        }

        button:active {
            transform: translateY(1px);
        }
    </style>
</head>

<body>
    <div class="game-card">
        <h1>Гра "Вгадай число"</h1>
        <p>🎯 Діапазон: <b>від 0 до 50</b></p>
        <button onclick="startGame()">Почати гру</button>
    </div>
    
    <script src="task2.js"></script>
</body>

</html>
