<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завдання 1. Дата та час</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-start: #3b82f6; /* Синій */
            --accent-end: #8b5cf6;   /* Фіолетовий */
            --text-primary: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 20% 30%, rgba(59, 130, 246, 0.15) 0px, transparent 40%),
                radial-gradient(at 80% 80%, rgba(139, 92, 246, 0.15) 0px, transparent 40%);
            color: var(--text-primary);
        }

        .container {
            text-align: center;
            padding: 40px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            max-width: 450px;
            width: 100%;
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            font-size: 2rem;
            background: linear-gradient(to right, var(--accent-start), var(--accent-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        button {
            padding: 15px 30px;
            font-size: 16px;
            cursor: pointer;
            background: linear-gradient(45deg, var(--accent-start), var(--accent-end));
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
            transition: all 0.3s ease;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5);
        }

        button:active {
            transform: translateY(1px);
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Поточний час та дата</h2>
        <p>Результат буде виведено в консоль (натисніть F12)</p>
        <button onclick="displayCurrentTime()">Викликати функцію</button>
    </div>
    
    <script src="task1.js"></script>
</body>

</html>
