<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJAX Square Calculator</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-color: #00d2ff;
            --accent-hover: #3a7bd5;
            --text-main: #ffffff;
            --text-muted: #b0bec5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .task-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 30px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            max-width: 350px;
            width: 100%;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .task-card:hover {
            transform: translateY(-5px);
        }

        h2 {
            margin-top: 0;
            font-size: 1.8rem;
            margin-bottom: 25px;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        label {
            display: block;
            text-align: left;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        button {
            width: 100%;
            background: linear-gradient(to right, var(--accent-color), var(--accent-hover));
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            box-shadow: 0 6px 20px rgba(0, 210, 255, 0.5);
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
        }

        #result {
            margin-top: 25px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            font-weight: 500;
            font-size: 1.1rem;
            color: var(--text-muted);
            border-left: 3px solid var(--accent-color);
            min-height: 24px;
            word-wrap: break-word;
        }

        .highlight {
            color: #00d2ff;
            font-weight: bold;
            font-size: 1.3rem;
        }
        
        .error {
            color: #ff4757;
        }
    </style>
</head>

<body>

    <div class="task-card">
        <h2>Квадрат числа</h2>
        <label for="numberInput">Введіть число для AJAX-запиту:</label>
        <input type="number" id="numberInput" placeholder="Наприклад: 25">
        <button onclick="calculateSquare()">Розрахувати на сервері</button>

        <div id="result">Тут буде відповідь сервера...</div>
    </div>

    <script src="lab5.js"></script>
</body>

</html>
